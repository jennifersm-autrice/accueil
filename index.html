<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jennifer S.M</title>
    <link rel="icon" type="image/png" href="uploads/benedetta.png">
    <link rel="apple-touch-icon" href="uploads/benedetta.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;family=DM+Sans:wght@300;400;500&amp;display=swap"
          rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(160deg,
            #d4857a 0%,
            #c87a7a 18%,
            #b87888 35%,
            #9080a0 52%,
            #6880a8 68%,
            #3d6090 82%,
            #1e3d6a 100%);
            display: flex;
            justify-content: center;
            padding: 48px 16px 80px;
        }

        .page {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 36px;
        }

        .avatar-wrap {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #e25655, #baa08f, #6f9286);
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            display: block;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            color: #fff8f5;
            letter-spacing: 0.01em;
            text-align: center;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
        }

        .bio {
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 240, 232, 0.80);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-align: center;
        }

        /* ── SOCIAL ICONS ── */
        .socials {
            display: flex;
            gap: 14px;
            margin-bottom: 36px;
        }

        .social-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.28);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
            color: #fff8f5;
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.30);
            transform: translateY(-2px);
        }

        .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ── LINKS ── */
        .section-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255, 240, 232, 0.70);
            margin-bottom: 14px;
            align-self: flex-start;
            width: 100%;
        }

        .links-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 10px;
            padding: 14px 20px;
            color: #fff8f5;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.2s, transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.12);
            width: 100%;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.28);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.20);
        }

        .link-btn .icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-btn .icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .link-btn .label {
            flex: 1;
        }

        .link-btn .arrow {
            font-size: 13px;
            opacity: 0.6;
            color: rgba(255, 240, 232, 0.8);
        }

        /* ── BOOK CARD ── */
        .book-section {
            width: 100%;
            margin-bottom: 40px;
        }

        .book-row {
            display: flex;
            gap: 18px;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.15);
        }

        .book-img {
            width: 90px;
            flex-shrink: 0;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
            object-fit: cover;
        }

        .book-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 2px;
        }

        .book-name {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            color: #fff8f5;
            letter-spacing: 0.02em;
        }

        .format-links {
            display: flex;
            gap: 6px;
        }

        .store-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 10px;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.08);
            overflow: hidden;
            padding: 5px;
        }

        .store-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ── FOOTER ── */
        .footer {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.04em;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 400px) {
            .book-row {
                gap: 10px;
                padding: 12px;
            }
            .book-img {
                width: 76px;
            }
            .store-btn {
                width: 38px;
                height: 38px;
            }
            .format-links {
                gap: 4px;
            }
        }
    </style>
</head>
<body>
<div class="page">

    <!-- HEADER -->
    <div class="header">
        <div class="avatar-wrap">
            <img src="uploads/jennifer.jpg" alt="Jennifer S.M">
        </div>
        <div>
            <div class="name">Jennifer S.M</div>
            <div class="bio" style="margin-top:6px;">Jeune autrice · 26 ans</div>
        </div>
    </div>

    <!-- LINKS -->
    <div class="section-label">Retrouvez-moi</div>
    <div class="links-group">
        <a href="https://www.instagram.com/jennifersmautrice/" target="_blank" class="link-btn">
            <span class="icon">
                <img src="uploads/instagram.png" style="width: 36px; height: 36px; border-radius: 8px; object-fit: cover;" alt="Instagram">
            </span>
            <span class="label">Instagram</span>
            <span class="arrow">›</span>
        </a>

        <a href="https://www.tiktok.com/@jennifer_soens" target="_blank" class="link-btn">
            <span class="icon">
                <img src="uploads/tiktok.png" style="width: 36px; height: 36px; border-radius: 8px; object-fit: cover;" alt="Instagram">
            </span>
            <span class="label">TikTok</span>
            <span class="arrow">›</span>
        </a>
    </div>

    <!-- BOOK CARD -->
    <div class="section-label">Mon livre</div>
    <div class="book-section">
        <div class="book-row">
            <img class="book-img" src="uploads/benedetta.png" alt="Benedetta">
            <div class="book-info">
                <div style="display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;">
                    <div class="book-name">Benedetta</div>
                    <span style="font-family:'Playfair Display',serif; font-style:italic; font-size:11px; color:rgba(255,220,200,0.85); white-space:nowrap;">Lettres à Part éditions</span>
                </div>
                <p style="font-size:12px; line-height:1.6; color:rgba(255,240,232,0.80); margin-top:2px; font-style:italic;">
                    « Jusqu'où seriez-vous prêt à aller pour protéger ceux que vous aimez&nbsp;? »</p>
                <div class="format-links" style="margin-top:8px;">
                    <a href="https://www.lettresapart.fr/product-page/benedetta" target="_blank" class="store-btn lap"
                       title="Lettres à Part">
                        <img src="uploads/lettres_a_part.png" alt="Lettres à Part">
                    </a>
                    <a href="https://www.amazon.fr/Benedetta-Jennifer-S-M/dp/2494210305" target="_blank"
                       class="store-btn amazon" title="Amazon">
                        <img src="uploads/amazon.png" alt="Amazon">
                    </a>
                    <a href="https://www.cultura.com/p-benedetta-9782494210301.html" target="_blank"
                       class="store-btn cultura" title="Cultura">
                        <img src="uploads/cultura.png" alt="Cultura">
                    </a>
                    <a href="https://www.furet.com/livres/benedetta-jennifer-s-m-9782494210301.html" target="_blank"
                       class="store-btn furet" title="Le Furet du Nord">
                        <img src="uploads/furet.png" alt="Le Furet du Nord">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="footer"
         style="font-family:'DM Sans',sans-serif; font-size:11px; letter-spacing:0.08em; color:rgba(255,255,255,0.30); display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <span>© 2026 Jennifer S.M</span>
        <a href="mentions-legales.html" style="color: rgba(255,255,255,0.4); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 1px;">Mentions légales</a>
    </div>
</div>


</body>
</html>
